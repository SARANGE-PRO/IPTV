<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Hors ligne · IPTV</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; box-sizing: border-box; }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        text-align: center;
        background: #08080a;
        color: #f4f4f6;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .dot { width: 12px; height: 12px; border-radius: 999px; background: #e50914; }
      h1 { font-size: 20px; font-weight: 600; }
      p { max-width: 22rem; font-size: 14px; line-height: 1.6; color: #9a9aa2; }
      button {
        margin-top: 8px;
        padding: 10px 20px;
        border: 0;
        border-radius: 12px;
        background: #e50914;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <span class="dot"></span>
    <h1>Hors ligne</h1>
    <p>Aucune connexion réseau. Le streaming IPTV nécessite Internet. Reconnecte-toi puis réessaie.</p>
    <button onclick="location.reload()">Réessayer</button>
  </body>
</html>
