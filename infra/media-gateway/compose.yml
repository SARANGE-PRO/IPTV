# Passerelle media auto-hebergee (maison) : proxy + transcodage, exposee en
# HTTPS par un Cloudflare Tunnel (aucun port a ouvrir sur ta box).
#
#   1. cp .env.example .env  puis renseigne UPSTREAM_ORIGIN et TUNNEL_TOKEN
#   2. docker compose up -d --build
#
services:
  gateway:
    build: .
    restart: unless-stopped
    environment:
      UPSTREAM_ORIGIN: ${UPSTREAM_ORIGIN}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      TRANSCODE: ${TRANSCODE:-1}
      VIDEO_CODEC: ${VIDEO_CODEC:-copy}
      UPSTREAM_USER_AGENT: ${UPSTREAM_USER_AGENT:-}
    networks: [media]

  # Tunnel Cloudflare : route ton hostname public -> http://gateway:8080.
  # Cree le tunnel dans le dashboard Cloudflare (Zero Trust > Networks >
  # Tunnels), colle le token dans .env. Le service sortant utilise l'IP de
  # cette machine (residentielle) -> le CDN renvoie 206 au lieu de 456.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on: [gateway]
    networks: [media]

networks:
  media:
